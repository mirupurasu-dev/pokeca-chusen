name: ポケカ抽選チェック

on:
  schedule:
    - cron: '*/30 * * * *' # 30分ごと（UTC基準・多少遅延あり）
  workflow_dispatch: {} # 手動実行も可

# seen.json をコミットして状態を保持するため書き込み権限が必要
permissions:
  contents: write

concurrency:
  group: chusen
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node src/index.js

      - name: Persist state (seen.json)
        run: |
          if [[ -n "$(git status --porcelain data/seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/seen.json
            git commit -m "chore: update seen.json [skip ci]"
            git push
          else
            echo "no state change"
          fi
