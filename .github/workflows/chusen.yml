name: ポケカ抽選チェック

on:
  schedule:
    - cron: '*/15 * * * *' # 15分ごと（入荷速報の検知を速く。Public repoはActions無料）
  workflow_dispatch: {} # 手動実行も可

# seen.json/dashboard のコミットに contents:write、Pages公開に pages/id-token
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: chusen
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node src/index.js

      - name: Persist state & dashboard
        run: |
          git add data/ public/
          if [[ -z "$(git status --porcelain data/ public/)" ]]; then
            echo "no change"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update dashboard & state [skip ci]"
          # 実行中に main が進んでいた場合に備えリベース＋リトライ
          # （生成物のコンフリクトは自分の新しい生成結果 = theirs を採用）
          for i in 1 2 3; do
            git fetch origin main
            git rebase -X theirs origin/main || { git rebase --abort; sleep 5; continue; }
            git push && exit 0
            sleep 5
          done
          echo "push failed after retries" >&2; exit 1

      # ── ダッシュボードを GitHub Pages に公開 ──
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
