name: ポケカ抽選チェック

on:
  schedule:
    - cron: '*/30 * * * *' # 30分ごと（UTC基準・多少遅延あり）
  workflow_dispatch: {} # 手動実行も可

# seen.json/dashboard のコミットに contents:write、Pages公開に pages/id-token
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: chusen
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node src/index.js

      - name: Persist state & dashboard
        run: |
          git add data/seen.json public/index.html
          if [[ -n "$(git status --porcelain data/seen.json public/index.html)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update dashboard & state [skip ci]"
            git push
          else
            echo "no change"
          fi

      # ── ダッシュボードを GitHub Pages に公開 ──
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
